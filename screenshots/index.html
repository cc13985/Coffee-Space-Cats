<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Space Cats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <span class="logo">☕🐱🚀</span>
    <nav>
      <a href="#mission">Mission</a>
      <a href="#crew">Crew</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="mission">
      <h1>Welcome to <span class="accent">Coffee Space Cats</span></h1>
      <p>We are a team of highly caffeinated cats exploring the cosmos.</p>
      <button class="btn-launch" onclick="launch()">Launch Mission 🚀</button>
    </section>

    <section class="crew" id="crew">
      <h2>Meet the Crew</h2>
      <div class="card-grid">
        <div class="card" data-role="pilot">
          <h3>Nebula</h3>
          <p>Chief Pilot &amp; Espresso Officer</p>
        </div>
        <div class="card" data-role="engineer">
          <h3>Cosmo</h3>
          <p>Lead Engineer &amp; Latte Technician</p>
        </div>
      </div>
    </section>
  </main>

  <script src="mission.js"></script>
</body>
</html>
